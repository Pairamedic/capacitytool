<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EMS Short Form</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
        font-size: 12px;
    }
    .section {
        border: 1px solid #000;
        padding: 8px;
        margin-bottom: 10px;
    }
    .row {
        display: flex;
        gap: 10px;
        margin-bottom: 5px;
    }
    .field {
        flex: 1;
    }
    .label {
        font-weight: bold;
    }
    .line {
        border-bottom: 1px solid #000;
        height: 18px;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 5px;
    }
    table, th, td {
        border: 1px solid black;
    }
    th, td {
        padding: 5px;
        text-align: left;
    }
</style>
</head>

<body>

<h2>EMS SHORT FORM</h2>

<div class="section">
    <div class="row">
        <div class="field">
            <div class="label">First Name</div>
            <div class="line"></div>
        </div>
        <div class="field">
            <div class="label">Last Name</div>
            <div class="line"></div>
        </div>
        <div class="field">
            <div class="label">DOB</div>
            <div class="line"></div>
        </div>
    </div>
</div>

<div class="section">
    <div class="label">Chief Complaint</div>
    <div class="line"></div>
    <div class="line"></div>
</div>

<div class="section">
    <div class="label">Medical History</div>
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
</div>

<div class="section">
    <div class="label">Allergies</div>
    <div class="line"></div>
</div>

<div class="section">
    <div class="label">Medications</div>
    <div class="line"></div>
    <div class="line"></div>
</div>

<div class="section">
    <div class="label">Vitals</div>
    <table>
        <tr>
            <th>Time</th>
            <th>BP</th>
            <th>HR</th>
            <th>RR</th>
            <th>SpO2</th>
            <th>Temp</th>
            <th>EKG</th>
            <th>BGL</th>
        </tr>
        <tr>
            <td height="30"></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td height="30"></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
    </table>
</div>

<div class="section">
    <div class="label">Interventions</div>
    <table>
        <tr>
            <th>Time</th>
            <th>Intervention</th>
        </tr>
        <tr>
            <td height="30"></td>
            <td></td>
        </tr>
        <tr>
            <td height="30"></td>
            <td></td>
        </tr>
        <tr>
            <td height="30"></td>
            <td></td>
        </tr>
    </table>
</div>

</body>
</html>
