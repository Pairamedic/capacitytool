<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALS Unit Stock Sheet</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }
    h1 {
        text-align: center;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
    }
    th, td {
        border: 1px solid #000;
        padding: 6px;
        font-size: 12px;
        text-align: left;
    }
    th {
        background: #eee;
    }
    input {
        width: 100%;
        border: none;
        outline: none;
        font-size: 12px;
    }
    .section-title {
        background: #ccc;
        font-weight: bold;
        text-align: center;
    }
    .btn {
        padding: 10px 15px;
        font-size: 14px;
        cursor: pointer;
        margin-bottom: 20px;
    }
    @media print {
        .btn {
            display: none;
        }
    }
</style>
</head>

<body>

<h1>ALS Unit Stock Sheet</h1>

<button class="btn" onclick="window.print()">Export / Print as PDF</button>

<!-- MEDICATIONS & SUPPLIES -->
<table>
    <tr>
        <th>Qty</th>
        <th>Act</th>
        <th>Medications & Supplies</th>
        <th>Expiration Date</th>
    </tr>

    <!-- Repeat rows as needed -->
    <script>
        const meds = [
            "18g Needles","20g Needles","21g Needles",
            "60mL Syringe","20mL Syringe","10mL Syringe","3mL Syringe","1mL Syringe",
            "Albuterol","Atrovent","Atropine","Epi 1:1","Epi 1:10",
            "Lidocaine","Lidocaine Drip","Dopamine Drip","Narcan",
            "Magnesium","Calcium","Hydralazine","Sodium Bicarb","D10",
            "Lasix","Adenosine","Zofran","Labetalol",
            "Activated Charcoal","Thiamine","Nitro","Benadryl",
            "Aspirin","Verapamil","Oral Glucose","Solu-Medrol",
            "Bacteriostatic Water","Amiodarone","TXA","Glucagon","Diltiazem"
        ];

        document.write(meds.map(item => `
            <tr>
                <td><input type="text"></td>
                <td><input type="text"></td>
                <td>${item}</td>
                <td><input type="date"></td>
            </tr>
        `).join(""));
    </script>
</table>

<!-- IV POUCH -->
<table>
    <tr><th colspan="4" class="section-title">IV Pouch</th></tr>
    <tr>
        <th>Qty</th>
        <th>Act</th>
        <th>Item</th>
        <th>Notes</th>
    </tr>

    <script>
        const ivItems = [
            "NS 1000mL","10gtt set","Saline lock","Saline flush",
            "14G IV Cath","16G IV Cath","18G IV Cath","20G IV Cath",
            "22G IV Cath","24G IV Cath","Alcohol prep","4x4 Gauze","Tape"
        ];

        document.write(ivItems.map(item => `
            <tr>
                <td><input type="text"></td>
                <td><input type="text"></td>
                <td>${item}</td>
                <td><input type="text"></td>
            </tr>
        `).join(""));
    </script>
</table>

<!-- AIRWAY / TOOLS -->
<table>
    <tr><th colspan="4" class="section-title">Airway / Tools</th></tr>
    <tr>
        <th>Qty</th>
        <th>Act</th>
        <th>Item</th>
        <th>Notes</th>
    </tr>

    <script>
        const airway = [
            "Laryngoscope Handle","Mac 2 Blade","Mac 3 Blade","Mac 4 Blade",
            "Miller 2 Blade","Miller 3 Blade","Miller 4 Blade",
            "Adult BVM","Pediatric BVM","Magill Forceps (Adult)","Magill Forceps (Pediatric)"
        ];

        document.write(airway.map(item => `
            <tr>
                <td><input type="text"></td>
                <td><input type="text"></td>
                <td>${item}</td>
                <td><input type="text"></td>
            </tr>
        `).join(""));
    </script>
</table>

<!-- TRAUMA / BANDAGING -->
<table>
    <tr><th colspan="4" class="section-title">Bandaging / Misc</th></tr>
    <tr>
        <th>Qty</th>
        <th>Act</th>
        <th>Item</th>
        <th>Notes</th>
    </tr>

    <script>
        const misc = [
            "Trauma Dressing","ABD Pads","Vaseline Gauze",
            "Kerlix","Hemostats","CAT Tourniquet"
        ];

        document.write(misc.map(item => `
            <tr>
                <td><input type="text"></td>
                <td><input type="text"></td>
                <td>${item}</td>
                <td><input type="text"></td>
            </tr>
        `).join(""));
    </script>
</table>

<!-- CRITICAL BANDS -->
<table>
    <tr><th colspan="3" class="section-title">Critical Dx Bands</th></tr>
    <tr>
        <th>Qty</th>
        <th>Act</th>
        <th>Type</th>
    </tr>
    <tr>
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td>Trauma Bands</td>
    </tr>
    <tr>
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td>Stroke Bands</td>
    </tr>
</table>

</body>
</html>
