<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALS Unit Stock Sheet</title>

<style>
@page { size: letter; margin: 0; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #121212;
    color: white;
}

/* HEADER */
.controls {
    text-align: center;
    padding: 10px;
    background: #1e1e1e;
}

button {
    margin: 5px;
    padding: 10px 15px;
    background: #333;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover { background: #555; }

/* PAGE */
.sheet {
    position: relative;
    width: 816px;
    height: 1056px;
    margin: auto;
    display: none;
    background-size: contain;
    background-repeat: no-repeat;
}

.active { display: block; }

/* INPUT FIELDS */
.field {
    position: absolute;
}

input {
    background: rgba(0,0,0,0.65);
    border: 1px solid #444;
    color: white;
    font-size: 11px;
    padding: 2px;
}

/* PRINT MODE */
@media print {
    body { background: white; }
    .controls { display: none; }

    .sheet {
        display: block !important;
        page-break-after: always;
    }

    input {
        background: transparent;
        border: none;
        color: black;
    }
}
</style>
</head>

<body>

<div class="controls">
    <button onclick="showPage(1)">Page 1</button>
    <button onclick="showPage(2)">Page 2</button>
    <button onclick="window.print()">Export PDF</button>
</div>

<!-- ================= PAGE 1 ================= -->
<div id="page1" class="sheet active" style="background-image:url('page1.jpg')">

<!-- SAMPLE ROW ALIGNMENT (LEFT COLUMN MEDS) -->
<script>
function addField(page, top, left, width, id){
    document.write(`<input class="field" style="top:${top}px;left:${left}px;width:${width}px" data-id="${id}">`);
}
</script>

<!-- Generate rows dynamically -->
<script>
let y = 150;
for(let i=0;i<35;i++){
    addField(1,y,40,40,`p1_qty_${i}`);
    addField(1,y,85,40,`p1_act_${i}`);
    addField(1,y,300,120,`p1_exp_${i}`);
    y += 22;
}
</script>

<!-- IV POUCH (center column) -->
<script>
y = 150;
for(let i=0;i<25;i++){
    addField(1,y,420,40,`p1_iv_qty_${i}`);
    addField(1,y,465,40,`p1_iv_act_${i}`);
    y += 22;
}
</script>

<!-- RIGHT COLUMN -->
<script>
y = 150;
for(let i=0;i<25;i++){
    addField(1,y,650,40,`p1_r_qty_${i}`);
    addField(1,y,695,40,`p1_r_act_${i}`);
    y += 22;
}
</script>

</div>

<!-- ================= PAGE 2 ================= -->
<div id="page2" class="sheet" style="background-image:url('page2.jpg')">

<!-- HEADER FIELDS -->
<input class="field" style="top:60px; left:100px; width:150px;" data-id="date">
<input class="field" style="top:60px; left:300px; width:120px;" data-id="unit">
<input class="field" style="top:60px; left:460px; width:140px;" data-id="narc">
<input class="field" style="top:60px; left:620px; width:80px;" data-id="o2main">

<input class="field" style="top:95px; left:120px; width:180px;" data-id="paramedic">
<input class="field" style="top:95px; left:350px; width:180px;" data-id="emt">

<!-- LEFT COLUMN -->
<script>
y = 160;
for(let i=0;i<30;i++){
    addField(2,y,40,40,`p2_l_qty_${i}`);
    addField(2,y,85,40,`p2_l_act_${i}`);
    y += 22;
}
</script>

<!-- CENTER COLUMN -->
<script>
y = 160;
for(let i=0;i<30;i++){
    addField(2,y,350,40,`p2_c_qty_${i}`);
    addField(2,y,395,40,`p2_c_act_${i}`);
    y += 22;
}
</script>

<!-- RIGHT COLUMN -->
<script>
y = 160;
for(let i=0;i<30;i++){
    addField(2,y,650,40,`p2_r_qty_${i}`);
    addField(2,y,695,40,`p2_r_act_${i}`);
    y += 22;
}
</script>

</div>

<!-- ================= SCRIPT ================= -->
<script>
// PAGE SWITCH
function showPage(num){
    document.querySelectorAll('.sheet').forEach(p => p.classList.remove('active'));
    document.getElementById('page'+num).classList.add('active');
}

// AUTOSAVE
document.addEventListener("input", e => {
    if(e.target.matches("input")){
        localStorage.setItem(e.target.dataset.id, e.target.value);
    }
});

// LOAD DATA
window.onload = () => {
    document.querySelectorAll("input").forEach(input => {
        let val = localStorage.getItem(input.dataset.id);
        if(val) input.value = val;
    });
};
</script>

</body>
</html>
