<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALS Unit Stock Sheet</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #121212;
        color: #e0e0e0;
    }

    header {
        padding: 15px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
        background: #1e1e1e;
    }

    .controls {
        padding: 10px;
        text-align: center;
        background: #1e1e1e;
    }

    button {
        margin: 5px;
        padding: 10px 15px;
        background: #333;
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background: #555;
    }

    .page {
        display: none;
        padding: 15px;
    }

    .active {
        display: block;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
    }

    th, td {
        border: 1px solid #444;
        padding: 6px;
        font-size: 12px;
    }

    th {
        background: #222;
    }

    input {
        width: 100%;
        background: #1a1a1a;
        color: #fff;
        border: 1px solid #444;
        padding: 4px;
    }

    .section {
        background: #2a2a2a;
        font-weight: bold;
        text-align: center;
    }

    @media print {
        body { background: white; color: black; }
        input { border: none; color: black; }
        .controls { display: none; }
        .page { display: block !important; }
    }
</style>
</head>

<body>

<header>ALS Unit Stock Sheet</header>

<div class="controls">
    <button onclick="showPage(1)">Page 1</button>
    <button onclick="showPage(2)">Page 2</button>
    <button onclick="window.print()">Export PDF</button>
</div>

<!-- PAGE 1 -->
<div id="page1" class="page active">

<h3>Medications & Supplies</h3>
<table id="medTable"></table>

<h3>IV Supplies</h3>
<table id="ivTable"></table>

<h3>Airway</h3>
<table id="airwayTable"></table>

<h3>Trauma / Bands</h3>
<table id="traumaTable"></table>

</div>

<!-- PAGE 2 -->
<div id="page2" class="page">

<h3>Header Info</h3>
<table>
<tr>
<td>Date <input data-id="date"></td>
<td>Unit <input data-id="unit"></td>
<td>Narc Lock # <input data-id="narc"></td>
<td>Main O2 PSI <input data-id="o2main"></td>
<td>Port O2 PSI <input data-id="o2port"></td>
</tr>
<tr>
<td>Paramedic <input data-id="paramedic"></td>
<td>EMT <input data-id="emt"></td>
</tr>
</table>

<h3>Misc Equipment</h3>
<table id="miscTable"></table>

<h3>Airway Detailed</h3>
<table id="airway2Table"></table>

<h3>O2 Supplies</h3>
<table id="o2Table"></table>

<h3>Immobilization</h3>
<table id="immobilizationTable"></table>

<h3>Trauma Supplies</h3>
<table id="trauma2Table"></table>

</div>

<script>
function showPage(num){
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page'+num).classList.add('active');
}

// -------- AUTO SAVE --------
document.addEventListener("input", e => {
    if(e.target.matches("input")){
        localStorage.setItem(e.target.dataset.id || e.target.name, e.target.value);
    }
});

window.onload = () => {
    document.querySelectorAll("input").forEach(input => {
        let val = localStorage.getItem(input.dataset.id || input.name);
        if(val) input.value = val;
    });
};

// -------- TABLE BUILDER --------
function buildTable(id, items){
    const table = document.getElementById(id);
    table.innerHTML = `
        <tr>
            <th>Qty</th>
            <th>Act</th>
            <th>Item</th>
            <th>Exp / Notes</th>
        </tr>
    `;

    items.forEach((item, i) => {
        table.innerHTML += `
        <tr>
            <td><input data-id="${id}-qty-${i}"></td>
            <td><input data-id="${id}-act-${i}"></td>
            <td>${item}</td>
            <td><input data-id="${id}-exp-${i}"></td>
        </tr>`;
    });
}

// -------- PAGE 1 DATA --------
buildTable("medTable", [
"18g Needles","20g Needles","21g Needles",
"60mL Syringe","20mL Syringe","10mL Syringe","3mL Syringe","1mL Syringe",
"Albuterol","Atrovent","Atropine","Epi 1:1","Epi 1:10",
"Lidocaine","Dopamine","Narcan","Magnesium","Calcium","Sodium Bicarb",
"D10","Lasix","Adenosine","Zofran","Labetalol","Amiodarone","TXA","Glucagon","Diltiazem"
]);

buildTable("ivTable", [
"NS 1000mL","NS 500mL","10gtt set","Saline lock","Flush",
"14G Cath","16G Cath","18G Cath","20G Cath","22G Cath","24G Cath"
]);

buildTable("airwayTable", [
"Laryngoscope Handle","Mac 2","Mac 3","Mac 4","Miller 2","Miller 3","Miller 4",
"Adult BVM","Pediatric BVM"
]);

buildTable("traumaTable", [
"Trauma Dressing","ABD Pads","Vaseline Gauze","Kerlix","Tourniquet"
]);

// -------- PAGE 2 DATA --------
buildTable("miscTable", [
"Glucometer","Test Strips","Lancets","Manual BP Cuff","Stethoscope",
"Gloves","Bio Bags","Flashlight"
]);

buildTable("airway2Table", [
"ET Tubes 6.0–8.0","Bougie","OPA","NPA","Tube Holder"
]);

buildTable("o2Table", [
"Nasal Cannula","Non-Rebreather","Pediatric Mask","Nebulizer"
]);

buildTable("immobilizationTable", [
"KED","Traction Splint","Board Splints","C-Collars"
]);

buildTable("trauma2Table", [
"Sterile Water","4x4","Tape","Cold Packs","Bandages"
]);
</script>

</body>
</html>
