<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALS Unit Stock Sheet</title>

<style>
@page { size: letter; margin: 0; }

body {
    margin: 0;
    font-family: Arial;
    background: #121212;
}

/* CONTROLS */
.controls {
    text-align: center;
    padding: 10px;
    background: #1e1e1e;
}
button {
    padding: 8px 14px;
    margin: 5px;
    background: #333;
    color: white;
    border: none;
}

/* PAGE */
.sheet {
    position: relative;
    width: 816px;
    height: 1056px;
    margin: auto;
    display: none;
    background-size: contain;
    background-repeat: no-repeat;
}
.active { display: block; }

/* FIELDS */
input {
    position: absolute;
    font-size: 10px;
    padding: 1px;
    background: rgba(0,0,0,0.6);
    color: white;
    border: 1px solid #444;
}

/* PRINT */
@media print {
    .controls { display:none; }
    body { background:white; }
    .sheet { display:block !important; page-break-after: always; }
    input { border:none; background:transparent; color:black; }
}
</style>
</head>

<body>

<div class="controls">
<button onclick="showPage(1)">Page 1</button>
<button onclick="showPage(2)">Page 2</button>
<button onclick="window.print()">Export PDF</button>
</div>

<!-- ================= PAGE 1 ================= -->
<div id="page1" class="sheet active" style="background-image:url('page1.jpg')">

<script>
function f(id, t, l, w){
document.write(`<input style="top:${t}px;left:${l}px;width:${w}px" data-id="${id}">`);
}
</script>

<!-- LEFT COLUMN (MEDS FULL LIST) -->
<script>
let y=142;
for(let i=0;i<40;i++){
f(`p1_l_q_${i}`,y,38,38);
f(`p1_l_a_${i}`,y,78,38);
f(`p1_l_e_${i}`,y,300,120);
y+=20.8;
}
</script>

<!-- CENTER (IV POUCH 1 & 2) -->
<script>
y=142;
for(let i=0;i<32;i++){
f(`p1_c_q_${i}`,y,415,36);
f(`p1_c_a_${i}`,y,452,36);
y+=20.8;
}
</script>

<!-- RIGHT (POCKETS / AIRWAY / BLADES) -->
<script>
y=142;
for(let i=0;i<32;i++){
f(`p1_r_q_${i}`,y,645,36);
f(`p1_r_a_${i}`,y,682,36);
y+=20.8;
}
</script>

<!-- BOTTOM CRITICAL BANDS -->
<script>
f("trauma_band_qty",910,580,50);
f("stroke_band_qty",940,580,50);
</script>

</div>

<!-- ================= PAGE 2 ================= -->
<div id="page2" class="sheet" style="background-image:url('page2.jpg')">

<!-- HEADER -->
<input style="top:58px; left:90px; width:160px;" data-id="date">
<input style="top:58px; left:285px; width:120px;" data-id="unit">
<input style="top:58px; left:430px; width:140px;" data-id="narc">
<input style="top:58px; left:600px; width:80px;" data-id="o2main">

<input style="top:92px; left:110px; width:200px;" data-id="paramedic">
<input style="top:92px; left:360px; width:200px;" data-id="emt">

<!-- LEFT COLUMN (MISC + SUCTION + O2 + BSI) -->
<script>
y=150;
for(let i=0;i<42;i++){
f(`p2_l_q_${i}`,y,38,36);
f(`p2_l_a_${i}`,y,75,36);
y+=20.6;
}
</script>

<!-- CENTER (IV + AIRWAY FULL LIST) -->
<script>
y=150;
for(let i=0;i<42;i++){
f(`p2_c_q_${i}`,y,350,36);
f(`p2_c_a_${i}`,y,387,36);
y+=20.6;
}
</script>

<!-- RIGHT (MONITOR / O2 / IMMOBILIZATION / TRAUMA) -->
<script>
y=150;
for(let i=0;i<42;i++){
f(`p2_r_q_${i}`,y,650,36);
f(`p2_r_a_${i}`,y,687,36);
y+=20.6;
}
</script>

</div>

<!-- SCRIPT -->
<script>
function showPage(n){
document.querySelectorAll('.sheet').forEach(p=>p.classList.remove('active'));
document.getElementById('page'+n).classList.add('active');
}

// AUTOSAVE
document.addEventListener("input", e=>{
if(e.target.tagName==="INPUT"){
localStorage.setItem(e.target.dataset.id, e.target.value);
}
});

// LOAD
window.onload=()=>{
document.querySelectorAll("input").forEach(i=>{
let v=localStorage.getItem(i.dataset.id);
if(v) i.value=v;
});
};
</script>

</body>
</html>
