<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALS Unit Stock Sheet</title>

<style>
@page { size: letter; margin: 0; }

body {
    margin: 0;
    font-family: Arial;
    background: #f0f0f0;
}

/* TOP BAR */
.controls {
    position: sticky;
    top: 0;
    background: white;
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #ccc;
    z-index: 10;
}

button {
    padding: 10px;
    margin: 5px;
}

/* PAGE */
.sheet {
    position: relative;
    width: 816px;
    height: 1056px;
    margin: 10px auto;
    background-size: cover;
    background-position: center;
    display: none;
}

.active { display: block; }

/* INPUT */
input {
    position: absolute;
    font-size: 11px;
    border: none;
    border-bottom: 1px solid black;
    background: transparent;
}

/* MOBILE */
@media (max-width: 900px) {
    .sheet {
        transform: scale(0.95);
        transform-origin: top center;
    }
}

/* PRINT */
@media print {
    .controls { display: none; }
    body { background: white; }

    .sheet {
        display: block !important;
        transform: none;
        page-break-after: always;
    }

    input {
        border: none;
    }
}
</style>
</head>

<body>

<div class="controls">
<button onclick="showPage(1)">Page 1</button>
<button onclick="showPage(2)">Page 2</button>
<button onclick="window.print()">Export PDF</button>
</div>

<!-- PAGE 1 -->
<div id="page1" class="sheet active"
style="background-image:url('./page1.jpg')">

<!-- HEADER -->
<input style="top:80px; left:90px; width:150px;" data-id="date">
<input style="top:80px; left:270px; width:120px;" data-id="unit">
<input style="top:80px; left:420px; width:150px;" data-id="narc">
<input style="top:80px; left:600px; width:100px;" data-id="o2">

<input style="top:110px; left:110px; width:220px;" data-id="paramedic">
<input style="top:110px; left:380px; width:220px;" data-id="emt">

<script>
let y=150;
for(let i=0;i<50;i++){
document.write(`<input style="top:${y}px; left:40px; width:50px" data-id="p1_${i}_q">`);
document.write(`<input style="top:${y}px; left:100px; width:50px" data-id="p1_${i}_a">`);
document.write(`<input style="top:${y}px; left:160px; width:200px" data-id="p1_${i}_desc">`);

document.write(`<input style="top:${y}px; left:400px; width:50px" data-id="p1_${i}_q2">`);
document.write(`<input style="top:${y}px; left:460px; width:50px" data-id="p1_${i}_a2">`);

document.write(`<input style="top:${y}px; left:650px; width:50px" data-id="p1_${i}_q3">`);
document.write(`<input style="top:${y}px; left:710px; width:50px" data-id="p1_${i}_a3">`);

y+=18;
}
</script>

</div>

<!-- PAGE 2 -->
<div id="page2" class="sheet"
style="background-image:url('./page2.jpg')">

<script>
y=140;
for(let i=0;i<55;i++){
document.write(`<input style="top:${y}px; left:40px; width:50px" data-id="p2_${i}_q">`);
document.write(`<input style="top:${y}px; left:100px; width:50px" data-id="p2_${i}_a">`);
document.write(`<input style="top:${y}px; left:160px; width:200px" data-id="p2_${i}_desc">`);

document.write(`<input style="top:${y}px; left:400px; width:50px" data-id="p2_${i}_q2">`);
document.write(`<input style="top:${y}px; left:460px; width:50px" data-id="p2_${i}_a2">`);

document.write(`<input style="top:${y}px; left:650px; width:50px" data-id="p2_${i}_q3">`);
document.write(`<input style="top:${y}px; left:710px; width:50px" data-id="p2_${i}_a3">`);

y+=18;
}
</script>

</div>

<script>
function showPage(n){
document.querySelectorAll('.sheet').forEach(p=>p.classList.remove('active'));
document.getElementById('page'+n).classList.add('active');
}

// SAVE
document.addEventListener("input", e=>{
if(e.target.tagName==="INPUT"){
localStorage.setItem(e.target.dataset.id, e.target.value);
}
});

// LOAD
window.onload=()=>{
document.querySelectorAll("input").forEach(i=>{
let v=localStorage.getItem(i.dataset.id);
if(v) i.value=v;
});
};
</script>

</body>
</html>
